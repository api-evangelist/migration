features:
- name: Cloud Workload Migration
  description: Services like AWS Application Migration Service, Azure Migrate, and
    Google Cloud Migration Center lift and shift servers, VMs, and applications between
    data centers and cloud providers with assessment, replication, and cutover tooling.
- name: Database Migration and Replication
  description: Database migration services like AWS DMS, Oracle GoldenGate, and Google
    Cloud Datastream replicate transactional data between heterogeneous database engines
    with change data capture and minimal downtime cutover.
- name: Schema Migration and Versioning
  description: Tooling like dbt, Liquibase, and Flyway version, diff, and apply schema
    and transformation changes through migration files checked into source control
    alongside application code.
- name: ETL and Data Movement
  description: Platforms like Airbyte, Fivetran, Hotglue, and Stitch extract data
    from SaaS sources, APIs, and databases and load it into warehouses and lakes with
    managed connectors and incremental sync.
- name: Change Data Capture
  description: Tools like Debezium and Kafka Connect stream row-level database changes
    as events, enabling near-real-time replication, audit trails, and downstream system
    synchronization during long-running migrations.
- name: Assessment and Discovery
  description: Migration assessment tools inventory existing servers, applications,
    dependencies, and licenses to plan target architecture, sizing, and migration
    waves before cutover begins.
- name: Cutover Planning and Rollback
  description: Migration platforms coordinate rehearsals, dependency ordering, cutover
    windows, validation gates, and rollback procedures to reduce blast radius during
    go-live.
- name: API and Code Migration
  description: SDK and API migration tooling like Liblab and OpenRewrite regenerate
    client libraries and rewrite consumer code when APIs change versions, providers,
    or specification standards.
use_cases:
- name: Data Center to Cloud Lift and Shift
  description: Enterprises use AWS Application Migration Service, Azure Migrate, or
    Google Cloud Migration Center to inventory on-premise workloads and replicate
    them to the cloud with minimal application changes.
- name: Heterogeneous Database Migration
  description: Teams use AWS DMS or Oracle GoldenGate to migrate from legacy commercial
    databases like Oracle and SQL Server to open-source or cloud-native engines such
    as Postgres, Aurora, or BigQuery.
- name: SaaS Data Onboarding
  description: Data teams use Airbyte, Fivetran, or Stitch to backfill historical
    data from SaaS sources like Salesforce, HubSpot, and Stripe into a warehouse and
    keep it incrementally in sync.
- name: Real-Time Replication and CDC
  description: Engineering teams stand up Debezium and Kafka Connect to stream change
    data capture events from operational databases into analytical systems, search
    indexes, and microservices.
- name: Cross-Tenant SaaS Migration
  description: IT teams migrate mailboxes, files, and identities between Microsoft
    365, Google Workspace, and Slack tenants during mergers, acquisitions, or restructurings
    using dedicated tenant migration tooling.
- name: Schema Evolution at Deploy Time
  description: Application teams version SQL migrations alongside code using tools
    like dbt, Liquibase, and Flyway so that schema changes deploy and roll back atomically
    with releases.
- name: API Version Cutover
  description: API providers use migration tooling and codegen platforms like Liblab
    to help consumers move between major versions of an API with regenerated SDKs
    and rewritten call sites.
integrations:
- name: AWS Database Migration Service
  description: Managed database migration and replication service supporting homogeneous
    and heterogeneous migrations between Oracle, SQL Server, MySQL, Postgres, Aurora,
    and analytics targets.
- name: Azure Migrate
  description: Unified hub for discovery, assessment, and migration of servers, databases,
    web apps, and virtual desktops to Microsoft Azure.
- name: Google Cloud Datastream
  description: Serverless change data capture and replication service streaming changes
    from Oracle, MySQL, and Postgres into BigQuery, Cloud SQL, and Cloud Storage.
- name: Airbyte
  description: Open-source data integration platform with 350+ connectors for moving
    data from SaaS and database sources into warehouses and lakes.
- name: Fivetran
  description: Managed ELT platform with automated schema migration, normalization,
    and incremental replication from operational sources to cloud data warehouses.
- name: Oracle GoldenGate
  description: Real-time data replication and integration platform for heterogeneous
    database migration, high availability, and zero-downtime cutover.
- name: Debezium
  description: Open-source distributed change data capture platform built on Kafka
    Connect for streaming row-level changes from MySQL, Postgres, MongoDB, and more.
- name: dbt
  description: Data transformation and modeling tool that versions schema and transformation
    migrations as SQL and YAML alongside warehouse pipelines.
